<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بحث اسطوانة</title>

<style>

body{
    font-family:Tahoma, Arial;
    direction:rtl;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:20px;
    font-weight:bold;
}

h2{
    margin-bottom:10px;
    font-size:32px;
    font-weight:900;
    color:#111;
}

input{
    width:400px;
    max-width:90%;
    padding:12px;
    font-size:18px;
    border-radius:8px;
    border:2px solid #999;
    font-weight:900;
    outline:none;
}

#info{
    margin:10px;
    font-weight:900;
    font-size:18px;
    color:#111;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:15px;
}

th,td{
    border:1px solid #ddd;
    padding:9px;
    font-size:15px;
    font-weight:900;
}

th{
    background:#eee;
    position:sticky;
    top:0;
    font-size:16px;
}

/* السجلات الخاصة */
.special-row td{
    color:red;
    font-weight:900;
    font-size:16px;
    background:#fff5f5;
}

</style>
</head>

<body>

<h2>🔍 بحث اسطوانة</h2>

<input id="search" placeholder="ابحث (اسم - محافظة - جهة - رقم ثلاثي)">

<div id="info"></div>

<div id="table"></div>

<script>

const url =
"https://raw.githubusercontent.com/zadelrahmanzad-boop/Mognden/main/الدفع.csv";

let lines = [];
let worker;

// تحميل البيانات
fetch(url)
.then(r => r.text())
.then(text => {

    lines = text.trim().split("\n");

    document.getElementById("info").innerHTML =
    "تم تحميل: " + (lines.length - 1) + " سجل";

    initWorker();

});

function initWorker(){

worker = new Worker(URL.createObjectURL(new Blob([`

let cache = [];

self.onmessage = function(e){

    if(e.data.type === "init"){
        cache = e.data.lines;
        return;
    }

    let q = e.data.query;
    let res = [];
    let count = 0;

    for(let i=1;i<cache.length;i++){

        let row = cache[i];

        if(row.toLowerCase().includes(q)){

            let c = row.split(";");

            res.push({
                a:c[0]||"",
                b:c[1]||"",
                c:c[2]||"",
                d:c[3]||"",
                e:c[4]||""
            });

            count++;

            if(count >= 150) break;
        }
    }

    self.postMessage(res);
};

`], {type:"text/javascript"})));

worker.postMessage({
    type:"init",
    lines
});

worker.onmessage = function(e){

    render(e.data);

};

}

function render(data){

let html = `
<table>
<tr>
<th>المؤهل</th>
<th>الرقم الثلاثي</th>
<th>الاسم</th>
<th>المحافظة</th>
<th>الجهة</th>
</tr>
`;

data.forEach(r=>{

// تلوين السجل لو الجهة تحتوي على داخلية منطقة ( ج )
let rowClass = r.e.includes("داخلية منطقة ( ج )")
? "special-row"
: "";

html += `
<tr class="${rowClass}">
<td>${r.a}</td>
<td>${r.b}</td>
<td>${r.c}</td>
<td>${r.d}</td>
<td>${r.e}</td>
</tr>
`;

});

html += "</table>";

document.getElementById("table").innerHTML = html;

}

// بحث لحظي
let t;

document
.getElementById("search")
.addEventListener("input", function(){

clearTimeout(t);

let q = this.value.trim().toLowerCase();

if(q.length < 2){

    document.getElementById("table").innerHTML = "";
    return;

}

t = setTimeout(()=>{

    worker.postMessage({
        query:q
    });

}, 200);

});

</script>

</body>
</html>
