<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بحث اسطوانة</title>

<style>

body{
    font-family:Tahoma, Arial;
    direction:rtl;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:20px;
    font-weight:bold;
}

/* الهيدر */
.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    margin-bottom:20px;
}

.logo{
    width:80px;
    height:80px;
    border-radius:15px;
    object-fit:cover;
}

.title{
    font-size:28px;
    font-weight:900;
    color:#111;
    text-align:right;
    line-height:1.3;
}

.title span{
    font-size:18px;
    color:#555;
}

/* العناوين */
h2{
    margin-bottom:15px;
    font-size:36px;
    font-weight:900;
    color:#111;
}

/* البحث */
.search-box{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

input{
    width:260px;
    max-width:95%;
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:2px solid #999;
    font-weight:900;
    outline:none;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:900;
    background:#111;
    color:white;
}

.clear-btn{
    background:#c40000;
}

/* معلومات */
#info{
    margin:10px;
    font-size:20px;
    font-weight:900;
}

.count{
    color:#008000;
    font-size:22px;
    margin:10px;
}

/* جدول */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    font-size:18px;
    font-weight:900;
}

th{
    background:#eee;
    position:sticky;
    top:0;
}

/* مميز */
.special-row td{
    color:red;
    background:#fff5f5;
}

/* تسجيل الدخول */
#main{ display:none; }

#error{
    color:red;
    font-size:20px;
}

/* زر خروج */
.logout{
    background:#444;
    margin-top:10px;
}

</style>
</head>

<body>

<!-- تسجيل الدخول -->
<div id="login">

<h2>🔒 تسجيل الدخول</h2>

<input type="text" id="username" placeholder="اسم المستخدم">
<br><br>
<input type="password" id="password" placeholder="كلمة السر">
<br><br>

<button onclick="checkPassword()">دخول</button>

<div id="error"></div>

</div>

<!-- الصفحة الرئيسية -->
<div id="main">

<!-- الهيدر -->
<div class="header">

<img src="logo.png" class="logo">

<div class="title">
برمجة الحلواني<br>
<span>تكنولوجيا ومعلومات</span>
</div>

</div>

<h2>🔍 بحث اسطوانة</h2>

<div class="search-box">

<input id="nameSearch" placeholder="الاسم">
<input id="govSearch" placeholder="المحافظة">
<input id="numSearch" placeholder="الرقم الثلاثي">
<input id="entitySearch" placeholder="الجهة">
<input id="degreeSearch" placeholder="المؤهل">

<button class="clear-btn" onclick="clearSearch()">مسح</button>

</div>

<div id="info"></div>
<div class="count" id="count"></div>

<div id="table"></div>

<button class="logout" onclick="logout()">خروج</button>

</div>

<script>

/* المستخدمين */
const users = {
    "Eh":"Z2026",
    "sh":"2026",
    "mo":"2026",
    "user2":"2026"
};

/* تسجيل دخول */
function checkPassword(){

let u = document.getElementById("username").value;
let p = document.getElementById("password").value;

if(users[u] && users[u] === p){

    localStorage.setItem("loggedIn","true");

    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";

    loadData();

}else{

    document.getElementById("error").innerHTML="❌ خطأ في البيانات";

}

}

/* دخول تلقائي */
window.onload = function(){

if(localStorage.getItem("loggedIn")==="true"){

    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";

    loadData();

}

}

/* خروج */
function logout(){
localStorage.removeItem("loggedIn");
location.reload();
}

/* البيانات */
const url="https://raw.githubusercontent.com/zadelrahmanzad-boop/Mognden/main/الدفع.csv";

let lines=[];
let worker;

/* تحميل */
function loadData(){

fetch(url)
.then(r=>r.text())
.then(t=>{

lines=t.trim().split("\n");

document.getElementById("info").innerHTML=
"تم تحميل: "+(lines.length-1)+" سجل";

initWorker();

});

}

/* Worker */
function initWorker(){

worker=new Worker(URL.createObjectURL(new Blob([`

let cache=[];

self.onmessage=function(e){

if(e.data.type==="init"){
cache=e.data.lines;
return;
}

let n=e.data.name;
let g=e.data.gov;
let num=e.data.num;
let en=e.data.entity;
let d=e.data.degree;

let res=[];

for(let i=1;i<cache.length;i++){

let c=cache[i].split(";");

let a=(c[0]||"").toLowerCase();
let b=(c[1]||"").toLowerCase();
let cc=(c[2]||"").toLowerCase();
let dd=(c[3]||"").toLowerCase();
let ee=(c[4]||"").toLowerCase();

if(
cc.includes(n)&&
dd.includes(g)&&
b.includes(num)&&
ee.includes(en)&&
a.includes(d)
){

res.push({
a:c[0],b:c[1],c:c[2],d:c[3],e:c[4]
});

}

}

self.postMessage(res);

};

`],{type:"text/javascript"})));

worker.postMessage({type:"init",lines});

worker.onmessage=e=>render(e.data);

}

/* عرض */
function render(data){

document.getElementById("count").innerHTML=
"عدد النتائج: "+data.length;

let html=`<table>
<tr>
<th>المؤهل</th>
<th>الرقم</th>
<th>الاسم</th>
<th>المحافظة</th>
<th>الجهة</th>
</tr>`;

data.forEach(r=>{

let cls=r.e.includes("داخلية منطقة ( ج )")?"special-row":"";

html+=`
<tr class="${cls}">
<td>${r.a}</td>
<td>${r.b}</td>
<td>${r.c}</td>
<td>${r.d}</td>
<td>${r.e}</td>
</tr>`;

});

html+="</table>";

document.getElementById("table").innerHTML=html;

}

/* بحث لحظي */
let t;

document.addEventListener("input",()=>{

clearTimeout(t);

t=setTimeout(()=>{

worker.postMessage({
name:document.getElementById("nameSearch").value.toLowerCase(),
gov:document.getElementById("govSearch").value.toLowerCase(),
num:document.getElementById("numSearch").value.toLowerCase(),
entity:document.getElementById("entitySearch").value.toLowerCase(),
degree:document.getElementById("degreeSearch").value.toLowerCase()
});

},150);

});

/* مسح */
function clearSearch(){

document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("table").innerHTML="";
document.getElementById("count").innerHTML="";

}

</script>

</body>
</html>
