<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بحث اسطوانة</title>

<style>
body{
    font-family:Tahoma;
    direction:rtl;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:20px;
    font-weight:bold;
}

h2{font-size:40px;}

input{
    width:260px;
    padding:12px;
    margin:5px;
    font-size:18px;
    border-radius:10px;
    border:2px solid #999;
    font-weight:bold;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    background:#111;
    color:#fff;
}

.clear-btn{background:#c40000;}

#main{display:none;}
#error{color:red;margin-top:10px;}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    font-size:16px;
}

th{background:#eee;}

.special-row td{
    color:red;
    background:#fff5f5;
}

.count{margin-top:10px;font-size:18px;color:green;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>🔒 تسجيل الدخول</h2>
<input type="password" id="password" placeholder="كلمة السر">
<br>
<button onclick="checkPassword()">دخول</button>
<div id="error"></div>
</div>

<!-- MAIN -->
<div id="main">

<h2>🔍 بحث اسطوانة</h2>

<button onclick="logout()">🚪 خروج</button>

<br><br>

<input id="nameSearch" placeholder="الاسم">
<input id="govSearch" placeholder="المحافظة">
<input id="numSearch" placeholder="الرقم">
<input id="entitySearch" placeholder="الجهة">
<input id="degreeSearch" placeholder="المؤهل">

<button class="clear-btn" onclick="clearSearch()">مسح</button>

<div id="info"></div>
<div class="count" id="count"></div>
<div id="table"></div>

</div>

<script>

const USERS = {
  "Eh": { pass: "Z2026", time: 60*60*1000 },
  "mo": { pass: "2026", time: 30*60*1000 },
  "mo": { pass: "2026", time: 10*60*1000 }
};

let worker;
let lines = [];

/* ===== CHECK SESSION ===== */
window.onload = function(){

let s = localStorage.getItem("session");

if(s){

    s = JSON.parse(s);

    let u = USERS[s.user];

    if(u && Date.now() - s.start < u.time){

        showMain();
        loadData();

    } else {
        localStorage.removeItem("session");
    }
}

}

/* ===== LOGIN ===== */
function checkPassword(){

let pass = document.getElementById("password").value;

for(let u in USERS){

    if(USERS[u].pass === pass){

        localStorage.setItem("session", JSON.stringify({
            user:u,
            start:Date.now()
        }));

        showMain();
        loadData();
        return;
    }
}

document.getElementById("error").innerHTML = "❌ خطأ في كلمة السر";

}

/* ===== SHOW MAIN ===== */
function showMain(){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";
}

/* ===== LOGOUT ===== */
function logout(){
localStorage.removeItem("session");
location.reload();
}

/* ===== LOAD DATA ===== */
function loadData(){

fetch("https://raw.githubusercontent.com/zadelrahmanzad-boop/Mognden/main/الدفع.csv")
.then(r=>r.text())
.then(t=>{

lines = t.trim().split("\n");

document.getElementById("info").innerHTML =
"عدد السجلات: " + (lines.length-1);

initWorker();

});

}

/* ===== WORKER ===== */
function initWorker(){

worker = new Worker(URL.createObjectURL(new Blob([`

let cache=[];

self.onmessage=function(e){

if(e.data.type==="init"){
cache=e.data.lines;
return;
}

let res=[];

for(let i=1;i<cache.length;i++){

let c=cache[i].split(";");

let degree=(c[0]||"").toLowerCase();
let num=(c[1]||"").toLowerCase();
let name=(c[2]||"").toLowerCase();
let gov=(c[3]||"").toLowerCase();
let entity=(c[4]||"").toLowerCase();

if(
name.includes(e.data.name) &&
gov.includes(e.data.gov) &&
num.includes(e.data.num) &&
entity.includes(e.data.entity) &&
degree.includes(e.data.degree)
){

res.push({
a:c[0],b:c[1],c:c[2],d:c[3],e:c[4]
});

if(res.length>=500) break;
}

}

postMessage(res);
};

`],{type:"text/javascript"})));

worker.postMessage({type:"init",lines});

worker.onmessage = e => render(e.data);

}

/* ===== SEARCH ===== */
document.addEventListener("input",()=>{

if(!worker) return;

setTimeout(()=>{

worker.postMessage({
name: (nameSearch.value||"").toLowerCase(),
gov: (govSearch.value||"").toLowerCase(),
num: (numSearch.value||"").toLowerCase(),
entity: (entitySearch.value||"").toLowerCase(),
degree: (degreeSearch.value||"").toLowerCase()
});

},150);

});

/* ===== RENDER ===== */
function render(data){

document.getElementById("count").innerHTML =
"عدد النتائج: " + data.length;

let html = `
<table>
<tr>
<th>المؤهل</th>
<th>الرقم</th>
<th>الاسم</th>
<th>المحافظة</th>
<th>الجهة</th>
</tr>
`;

data.forEach(r=>{

let cls = r.e.includes("داخلية") ? "special-row" : "";

html += `
<tr class="${cls}">
<td>${r.a}</td>
<td>${r.b}</td>
<td>${r.c}</td>
<td>${r.d}</td>
<td>${r.e}</td>
</tr>
`;

});

html += "</table>";

document.getElementById("table").innerHTML = html;

}

/* ===== CLEAR ===== */
function clearSearch(){

nameSearch.value="";
govSearch.value="";
numSearch.value="";
entitySearch.value="";
degreeSearch.value="";

document.getElementById("table").innerHTML="";
document.getElementById("count").innerHTML="";

}

</script>

</body>
</html>
