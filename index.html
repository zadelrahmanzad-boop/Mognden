<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام البحث المتطور</title>

<style>

body{
    font-family:Tahoma;
    direction:rtl;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:20px;
    font-weight:bold;
}

h2{ font-size:34px; }

input,select{
    width:250px;
    padding:10px;
    margin:5px;
    border-radius:10px;
    border:2px solid #999;
    font-weight:bold;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#111;
    color:white;
    font-weight:bold;
}

.clear-btn{ background:#c40000; }
.logout{ background:#444; }

#main{ display:none; }

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:10px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    font-size:14px;
}

th{ background:#eee; }

.special-row td{
    color:red;
    background:#fff5f5;
}

#count{ color:green; font-size:18px; }

#stats{ margin:10px; font-size:16px; }

#userInfo{ font-size:18px; margin:10px; }

.panel{
    margin-top:20px;
    padding:10px;
    border-top:2px solid #000;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">

<h2>🔒 تسجيل الدخول</h2>

<input id="username" placeholder="اسم المستخدم">
<br>
<input type="password" id="password" placeholder="كلمة السر">
<br><br>

<button onclick="login()">دخول</button>

<div id="error"></div>

</div>

<!-- MAIN -->
<div id="main">

<div id="userInfo"></div>
<div id="stats"></div>

<h2>🔍 بحث ذكي</h2>

<input id="search" placeholder="ابحث هنا">

<button class="clear-btn" onclick="clearSearch()">مسح</button>

<div id="count"></div>
<div id="table"></div>

<!-- لوحة التحكم -->
<div class="panel" id="adminPanel" style="display:none;">

<h3>⚙️ لوحة التحكم</h3>

<input id="newUser" placeholder="اسم المستخدم">
<input id="newPass" placeholder="كلمة السر">

<select id="newRole">
<option value="viewer">viewer</option>
<option value="editor">editor</option>
<option value="admin">admin</option>
</select>

<button onclick="addUser()">➕ إضافة</button>

<div id="usersList"></div>

</div>

<button class="logout" onclick="logout()">خروج</button>

</div>

<script>

////////////////////////////
// USERS + ROLES
////////////////////////////
let users = JSON.parse(localStorage.getItem("users")) || {
    "admin": {pass:"eh2026", role:"admin"}
};

let stats = JSON.parse(localStorage.getItem("stats")) || {
    searches:0
};

function saveUsers(){
localStorage.setItem("users",JSON.stringify(users));
}

function saveStats(){
localStorage.setItem("stats",JSON.stringify(stats));
}

////////////////////////////
// LOGIN
////////////////////////////
function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(users[u] && users[u].pass===p){

    localStorage.setItem("loggedIn","true");
    localStorage.setItem("user",u);

    showMain(u);

}else{
    document.getElementById("error").innerHTML="❌ خطأ";
}

}

////////////////////////////
// SHOW MAIN
////////////////////////////
function showMain(user){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("userInfo").innerHTML="👤 "+user;

renderStats();

if(users[user].role==="admin"){
document.getElementById("adminPanel").style.display="block";
renderUsers();
}

loadData();

}

////////////////////////////
// AUTO LOGIN
////////////////////////////
window.onload=function(){

let u=localStorage.getItem("user");

if(localStorage.getItem("loggedIn")==="true" && u){
showMain(u);
}

}

////////////////////////////
// LOGOUT
////////////////////////////
function logout(){
localStorage.clear();
location.reload();
}

////////////////////////////
// STATS
////////////////////////////
function renderStats(){

let total=Object.keys(users).length;

document.getElementById("stats").innerHTML=
`👥 Users: ${total} | 🔍 Searches: ${stats.searches}`;

}

////////////////////////////
// ADD USER
////////////////////////////
function addUser(){

let u=document.getElementById("newUser").value;
let p=document.getElementById("newPass").value;
let r=document.getElementById("newRole").value;

users[u]={pass:p,role:r};

saveUsers();
renderUsers();

alert("تم الإضافة");

}

////////////////////////////
// DELETE USER
////////////////////////////
function deleteUser(u){

if(u==="admin") return;

delete users[u];

saveUsers();
renderUsers();

}

////////////////////////////
// SHOW USERS
////////////////////////////
function renderUsers(){

let html="";

for(let u in users){

html+=`
<div>
<b>${u}</b> - ${users[u].role}
<button onclick="deleteUser('${u}')">حذف</button>
</div>
`;

}

document.getElementById("usersList").innerHTML=html;

}

////////////////////////////
// DATA
////////////////////////////
const url="https://raw.githubusercontent.com/zadelrahmanzad-boop/Mognden/main/الدفع.csv";

let lines=[];
let worker;

function loadData(){

fetch(url)
.then(r=>r.text())
.then(t=>{

lines=t.trim().split("\n");

initWorker();

});

}

function initWorker(){

worker=new Worker(URL.createObjectURL(new Blob([`

let cache=[];

self.onmessage=function(e){

if(e.data.type==="init"){
cache=e.data.lines;
return;
}

let q=(e.data.q||"").toLowerCase();

let res=[];

for(let i=1;i<cache.length;i++){

let row=cache[i].toLowerCase();

if(q==="" || row.includes(q)){

res.push({row:cache[i]});

if(res.length>=150) break;

}

}

self.postMessage(res);

};

`],{type:"text/javascript"})));

worker.postMessage({type:"init",lines});

worker.onmessage=e=>render(e.data);

}

////////////////////////////
// RENDER
////////////////////////////
function render(data){

stats.searches++;
saveStats();
renderStats();

document.getElementById("count").innerHTML="عدد: "+data.length;

let html="<table>";

data.forEach(r=>{

html+=`<tr><td>${r.row}</td></tr>`;

});

html+="</table>";

document.getElementById("table").innerHTML=html;

}

////////////////////////////
// SEARCH
////////////////////////////
let t;

document.addEventListener("input",e=>{

if(e.target.id!=="search") return;

clearTimeout(t);

t=setTimeout(()=>{

worker.postMessage({
q:document.getElementById("search").value.trim()
});

},300);

});

////////////////////////////
// CLEAR
////////////////////////////
function clearSearch(){

document.getElementById("search").value="";
document.getElementById("table").innerHTML="";
document.getElementById("count").innerHTML="";

}

</script>

</body>
</html>
