<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بحث اسطوانة</title>

<style>
body{
    font-family:Tahoma;
    direction:rtl;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:20px;
    font-weight:bold;
}

h2{font-size:42px;}

input{
    width:280px;
    padding:15px;
    font-size:20px;
    border-radius:10px;
    border:2px solid #999;
    font-weight:bold;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    background:#111;
    color:#fff;
}

.clear-btn{background:#c40000;}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    font-size:18px;
    font-weight:bold;
}

th{background:#eee;}

.special-row td{
    color:red;
    background:#fff5f5;
}

#main{display:none;}
#error{color:red;font-size:20px;}
</style>
</head>

<body>

<!-- تسجيل الدخول -->
<div id="login">
<h2>🔒 تسجيل الدخول</h2>
<input type="password" id="password" placeholder="كلمة السر">
<br><br>
<button onclick="checkPassword()">دخول</button>
<div id="error"></div>
</div>

<!-- الصفحة -->
<div id="main">

<h2>🔍 بحث اسطوانة</h2>

<button onclick="logout()" style="background:#555;margin-bottom:10px;">
🚪 خروج
</button>

<br>

<input id="nameSearch" placeholder="الاسم">
<input id="govSearch" placeholder="المحافظة">
<input id="numSearch" placeholder="الرقم">
<input id="entitySearch" placeholder="الجهة">
<input id="degreeSearch" placeholder="المؤهل">

<button class="clear-btn" onclick="clearSearch()">مسح</button>

<div id="info"></div>
<div id="count"></div>
<div id="table"></div>

</div>

<script>

const USERS = {
  "Eh": { pass: "Z2026", time: 60*60*1000 },
  "mo": { pass: "2026", time: 30*60*1000 },
  "sh": { pass: "2026", time: 10*60*1000 }
};

let worker;
let lines = [];

window.onload = function(){

let session = localStorage.getItem("session");

if(session){

    session = JSON.parse(session);

    let user = USERS[session.user];

    if(user && Date.now() - session.start < user.time){

        document.getElementById("login").style.display = "none";
        document.getElementById("main").style.display = "block";

        loadData();

    } else {
        localStorage.removeItem("session");
    }
}

}

function checkPassword(){

let pass = document.getElementById("password").value;

for(let user in USERS){

    if(USERS[user].pass === pass){

        let session = {
            user: user,
            start: Date.now()
        };

        localStorage.setItem("session", JSON.stringify(session));

        document.getElementById("login").style.display = "none";
        document.getElementById("main").style.display = "block";

        loadData();
        return;
    }
}

document.getElementById("error").innerHTML = "❌ خطأ في كلمة السر";

}

function logout(){
localStorage.removeItem("session");
location.reload();
}

function loadData(){

fetch("https://raw.githubusercontent.com/zadelrahmanzad-boop/Mognden/main/الدفع.csv")
.then(r=>r.text())
.then(t=>{

lines = t.trim().split("\n");

document.getElementById("info").innerHTML =
"عدد السجلات: " + (lines.length-1);

initWorker();

});

}

function initWorker(){

worker = new Worker(URL.createObjectURL(new Blob([`

let cache=[];

self.onmessage=function(e){

if(e.data.type==="init"){
cache=e.data.lines;
return;
}

let res=[];

for(let i=1;i<cache.length;i++){

let c=cache[i].split(";");

if(
(c[2]||"").toLowerCase().includes(e.data.name)&&
(c[3]||"").toLowerCase().includes(e.data.gov)&&
(c[1]||"").toLowerCase().includes(e.data.num)&&
(c[4]||"").toLowerCase().includes(e.data.entity)&&
(c[0]||"").toLowerCase().includes(e.data.degree)
){

res.push({
a:c[0],b:c[1],c:c[2],d:c[3],e:c[4]
});

if(res.length>=500)break;
}

}

postMessage(res);
};

`],{type:"text/javascript"})));

worker.postMessage({type:"init",lines});

worker.onmessage=function(e){render(e.data);};

}

function render(data){

document.getElementById("count").innerHTML =
"عدد النتائج: "+data.length;

let html="<table><tr><th>المؤهل</th><th>الرقم</th><th>الاسم</th><th>المحافظة</th><th>الجهة</th></tr>";

data.forEach(r=>{

let cls=r.e.includes("داخلية")?"special-row":"";

html+=`<tr class="${cls}">
<td>${r.a}</td>
<td>${r.b}</td>
<td>${r.c}</td>
<td>${r.d}</td>
<td>${r.e}</td>
</tr>`;

});

html+="</table>";

document.getElementById("table").innerHTML=html;

}

document.addEventListener("input",()=>{

setTimeout(()=>{

worker.postMessage({
name:nameSearch.value.toLowerCase(),
gov:govSearch.value.toLowerCase(),
num:numSearch.value.toLowerCase(),
entity:entitySearch.value.toLowerCase(),
degree:degreeSearch.value.toLowerCase()
});

},150);

});

function clearSearch(){

nameSearch.value="";
govSearch.value="";
numSearch.value="";
entitySearch.value="";
degreeSearch.value="";

document.getElementById("table").innerHTML="";
document.getElementById("count").innerHTML="";

}

</script>

</body>
</html>
