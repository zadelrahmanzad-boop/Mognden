<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بحث اسطوانة</title>

<style>

body{
    font-family:Tahoma;
    direction:rtl;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:20px;
    font-weight:bold;
}

h2{ font-size:36px; }

input{
    width:280px;
    padding:12px;
    margin:5px;
    border-radius:10px;
    border:2px solid #999;
    font-size:18px;
    font-weight:bold;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#111;
    color:white;
    font-weight:bold;
}

.clear-btn{ background:#c40000; }

.logout{ background:#444; margin-top:10px; }

#main{ display:none; }

table{
    width:100%;
    margin-top:15px;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    font-size:16px;
}

th{ background:#eee; }

.special-row td{
    color:red;
    background:#fff5f5;
}

#count{
    font-size:20px;
    margin:10px;
    color:green;
}

#error{ color:red; }

#userInfo{
    font-size:20px;
    margin:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">

<h2>🔒 تسجيل الدخول</h2>

<input id="username" placeholder="اسم المستخدم">
<br>
<input type="password" id="password" placeholder="كلمة السر">
<br><br>

<button onclick="checkPassword()">دخول</button>

<div id="error"></div>

</div>

<!-- MAIN -->
<div id="main">

<div id="userInfo"></div>

<h2>🔍 بحث اسطوانة</h2>

<div>

<input id="search" placeholder="بحث عام">

<button class="clear-btn" onclick="clearSearch()">مسح</button>

</div>

<div id="count"></div>
<div id="table"></div>

<button class="logout" onclick="logout()">خروج</button>

</div>

<script>

/////////////////////
// USERS + ROLES
/////////////////////
const users = {
    "Eh": {pass:"Z2026", role:"admin"},
    "mo": {pass:"2026", role:"user"},
    "sh": {pass:"2026", role:"user"}
};

/////////////////////
// LOGIN
/////////////////////
function checkPassword(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(users[u] && users[u].pass===p){

    localStorage.setItem("loggedIn","true");
    localStorage.setItem("user",u);

    showMain(u);

}else{
    document.getElementById("error").innerHTML="❌ خطأ في البيانات";
}

}

/////////////////////
// SHOW MAIN
/////////////////////
function showMain(user){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("userInfo").innerHTML=
"👤 مرحباً: " + user;

loadData();

}

/////////////////////
// AUTO LOGIN
/////////////////////
window.onload=function(){

let u=localStorage.getItem("user");

if(localStorage.getItem("loggedIn")==="true" && u){

    showMain(u);

}

}

/////////////////////
// LOGOUT
/////////////////////
function logout(){
localStorage.clear();
location.reload();
}

/////////////////////
// DATA
/////////////////////
const url="https://raw.githubusercontent.com/zadelrahmanzad-boop/Mognden/main/الدفع.csv";

let lines=[];
let worker;

function loadData(){

fetch(url)
.then(r=>r.text())
.then(t=>{

lines=t.trim().split("\n");

initWorker();

});

}

function initWorker(){

worker=new Worker(URL.createObjectURL(new Blob([`

let cache=[];

self.onmessage=function(e){

if(e.data.type==="init"){
cache=e.data.lines;
return;
}

let q=(e.data.q||"").toLowerCase();

let res=[];

for(let i=1;i<cache.length;i++){

let c=cache[i].split(";");
let row=cache[i].toLowerCase();

if(q==="" || row.includes(q)){

res.push({
a:c[0],b:c[1],c:c[2],d:c[3],e:c[4]
});

if(res.length>=200) break;

}

}

self.postMessage(res);

};

`],{type:"text/javascript"})));

worker.postMessage({type:"init",lines});

worker.onmessage=e=>render(e.data);

}

/////////////////////
// RENDER
/////////////////////
function render(data){

document.getElementById("count").innerHTML=
"عدد النتائج: "+data.length;

let html=`<table>
<tr>
<th>المؤهل</th>
<th>الرقم</th>
<th>الاسم</th>
<th>المحافظة</th>
<th>الجهة</th>
</tr>`;

data.forEach(r=>{

let cls=(r.e||"").includes("داخلية منطقة ( ج )")?"special-row":"";

html+=`
<tr class="${cls}">
<td>${r.a||""}</td>
<td>${r.b||""}</td>
<td>${r.c||""}</td>
<td>${r.d||""}</td>
<td>${r.e||""}</td>
</tr>`;

});

html+="</table>";

document.getElementById("table").innerHTML=html;

}

/////////////////////
// SEARCH
/////////////////////
let t;

document.addEventListener("input",e=>{

if(e.target.id!=="search") return;

clearTimeout(t);

t=setTimeout(()=>{

worker.postMessage({
q:document.getElementById("search").value.trim()
});

},300);

});

/////////////////////
// CLEAR
/////////////////////
function clearSearch(){

document.getElementById("search").value="";
document.getElementById("table").innerHTML="";
document.getElementById("count").innerHTML="";

}

</script>

</body>
</html>
