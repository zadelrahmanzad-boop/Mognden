<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بحث اسطوانة</title>

<style>

body{
    font-family:Tahoma, Arial;
    direction:rtl;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:20px;
    font-weight:bold;
}

h2{
    margin-bottom:15px;
    font-size:42px;
    font-weight:900;
    color:#111;
}

.search-box{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

input{
    width:280px;
    max-width:95%;
    padding:15px;
    font-size:22px;
    border-radius:10px;
    border:2px solid #999;
    font-weight:900;
    outline:none;
}

button{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:900;
    background:#111;
    color:white;
}

button:hover{
    opacity:.9;
}

.clear-btn{
    background:#c40000;
}

#info{
    margin:15px;
    font-weight:900;
    font-size:24px;
    color:#111;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    font-size:20px;
    font-weight:900;
}

th{
    background:#eee;
    position:sticky;
    top:0;
    font-size:22px;
}

/* السجلات الخاصة */
.special-row td{
    color:red;
    font-weight:900;
    font-size:22px;
    background:#fff5f5;
}

#error{
    color:red;
    margin-top:15px;
    font-size:24px;
    font-weight:900;
}

#main{
    display:none;
}

.count{
    color:#008000;
    font-size:26px;
    margin-top:10px;
    font-weight:900;
}

</style>
</head>

<body>

<!-- تسجيل الدخول -->

<div id="login">

<h2>🔒 ادخل كلمة السر</h2>

<input type="password" id="password" placeholder="كلمة السر">

<br><br>

<button onclick="checkPassword()">دخول</button>

<div id="error"></div>

</div>

<!-- الصفحة -->

<div id="main">

<h2>🔍 بحث اسطوانة</h2>

<div class="search-box">

<input id="nameSearch" placeholder="بحث بالاسم">

<input id="govSearch" placeholder="بحث بالمحافظة">

<input id="numSearch" placeholder="بحث بالرقم الثلاثي">

<input id="entitySearch" placeholder="بحث بالجهة">

<input id="degreeSearch" placeholder="بحث بالمؤهل">

<button class="clear-btn" onclick="clearSearch()">
مسح البحث
</button>

</div>

<div id="info"></div>

<div class="count" id="count"></div>

<div id="table"></div>

</div>

<script>

// كلمة السر
const PASSWORD = "eh2026";

function checkPassword(){

let pass = document.getElementById("password").value;

if(pass === PASSWORD){

    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";

    loadData();

}else{

    document.getElementById("error").innerHTML =
    "❌ كلمة السر غير صحيحة";

}

}

const url =
"https://raw.githubusercontent.com/zadelrahmanzad-boop/Mognden/main/الدفع.csv";

let lines = [];
let worker;

// تحميل البيانات
function loadData(){

fetch(url)
.then(r => r.text())
.then(text => {

    lines = text.trim().split("\n");

    document.getElementById("info").innerHTML =
    "تم تحميل: " + (lines.length - 1) + " سجل";

    initWorker();

});

}

// إنشاء Worker
function initWorker(){

worker = new Worker(URL.createObjectURL(new Blob([`

let cache = [];

self.onmessage = function(e){

    if(e.data.type === "init"){
        cache = e.data.lines;
        return;
    }

    let name = e.data.name;
    let gov = e.data.gov;
    let num = e.data.num;
    let entity = e.data.entity;
    let degree = e.data.degree;

    let res = [];
    let count = 0;

    for(let i=1;i<cache.length;i++){

        let row = cache[i];
        let c = row.split(";");

        let a = (c[0] || "").toLowerCase();
        let b = (c[1] || "").toLowerCase();
        let cc = (c[2] || "").toLowerCase();
        let d = (c[3] || "").toLowerCase();
        let eee = (c[4] || "").toLowerCase();

        if(
            cc.includes(name) &&
            d.includes(gov) &&
            b.includes(num) &&
            eee.includes(entity) &&
            a.includes(degree)
        ){

            res.push({
                a:c[0]||"",
                b:c[1]||"",
                c:c[2]||"",
                d:c[3]||"",
                e:c[4]||""
            });

            count++;

            if(count >= 500) break;
        }
    }

    self.postMessage(res);
};

`], {type:"text/javascript"})));

worker.postMessage({
    type:"init",
    lines
});

worker.onmessage = function(e){

    render(e.data);

};

}

// عرض النتائج
function render(data){

document.getElementById("count").innerHTML =
"عدد النتائج: " + data.length;

let html = `
<table>
<tr>
<th>المؤهل</th>
<th>الرقم الثلاثي</th>
<th>الاسم</th>
<th>المحافظة</th>
<th>الجهة</th>
</tr>
`;

data.forEach(r=>{

let rowClass = r.e.includes("داخلية منطقة ( ج )")
? "special-row"
: "";

html += `
<tr class="${rowClass}">
<td>${r.a}</td>
<td>${r.b}</td>
<td>${r.c}</td>
<td>${r.d}</td>
<td>${r.e}</td>
</tr>
`;

});

html += "</table>";

document.getElementById("table").innerHTML = html;

}

// البحث اللحظي
let t;

document.addEventListener("input", function(){

clearTimeout(t);

t = setTimeout(()=>{

    let name =
    document.getElementById("nameSearch")
    .value.trim().toLowerCase();

    let gov =
    document.getElementById("govSearch")
    .value.trim().toLowerCase();

    let num =
    document.getElementById("numSearch")
    .value.trim().toLowerCase();

    let entity =
    document.getElementById("entitySearch")
    .value.trim().toLowerCase();

    let degree =
    document.getElementById("degreeSearch")
    .value.trim().toLowerCase();

    worker.postMessage({
        name:name,
        gov:gov,
        num:num,
        entity:entity,
        degree:degree
    });

}, 150);

});

// مسح البحث
function clearSearch(){

document.getElementById("nameSearch").value = "";
document.getElementById("govSearch").value = "";
document.getElementById("numSearch").value = "";
document.getElementById("entitySearch").value = "";
document.getElementById("degreeSearch").value = "";

document.getElementById("table").innerHTML = "";
document.getElementById("count").innerHTML = "";

}

</script>

</body>
</html>
