<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بحث سريع جدا</title>

<style>

body{
    font-family:Arial;
    direction:rtl;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:20px;
}

input{
    width:350px;
    max-width:90%;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:7px;
    font-size:14px;
}

th{
    background:#ececec;
}

#count{
    margin-top:15px;
    font-weight:bold;
}

</style>
</head>

<body>

<h2>البحث في البيانات</h2>

<input type="text"
id="search"
placeholder="اكتب للبحث">

<div id="count"></div>

<div id="table"></div>

<script>

const url =
"https://raw.githubusercontent.com/zadelrahmanzad-boop/Mognden/main/الدفع.csv";

let lines = [];

fetch(url)
.then(r => r.text())
.then(text => {

    lines = text.split("\n");

    document.getElementById("count").innerHTML =
    "تم تحميل البيانات: " + (lines.length - 1);

});

document.getElementById("search")
.addEventListener("input", function(){

    let q = this.value.trim().toLowerCase();

    if(q.length < 2){
        document.getElementById("table").innerHTML = "";
        return;
    }

    let html = `
    <table>
    <tr>
        <th>المؤهل</th>
        <th>الرقم الثلاثي</th>
        <th>الاسم</th>
        <th>المحافظة</th>
        <th>الجهة</th>
    </tr>
    `;

    let found = 0;

    for(let i = 1; i < lines.length; i++){

        let row = lines[i];

        if(row.toLowerCase().includes(q)){

            let c = row.split(",");

            html += `
            <tr>
                <td>${c[0] || ""}</td>
                <td>${c[2] || ""}</td>
                <td>${c[3] || ""}</td>
                <td>${c[4] || ""}</td>
                <td>${c[5] || ""}</td>
            </tr>
            `;

            found++;

            // حد أقصى للنتائج
            if(found >= 100)
                break;
        }
    }

    html += "</table>";

    document.getElementById("count").innerHTML =
    "عدد النتائج: " + found;

    document.getElementById("table").innerHTML = html;

});

</script>

</body>
</html>
