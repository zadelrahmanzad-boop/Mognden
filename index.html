<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بحث اسطوانة</title>

<style>

body{
    font-family:Tahoma, Arial;
    direction:rtl;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:20px;
    font-weight:bold;
}

h2{
    margin-bottom:15px;
    font-size:42px;
    font-weight:900;
    color:#111;
}

input{
    width:450px;
    max-width:95%;
    padding:15px;
    font-size:24px;
    border-radius:10px;
    border:2px solid #999;
    font-weight:900;
    outline:none;
    margin:8px;
}

button{
    padding:15px 35px;
    font-size:24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:900;
    background:#111;
    color:white;
}

#info{
    margin:15px;
    font-weight:900;
    font-size:24px;
    color:#111;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    font-size:20px;
    font-weight:900;
}

th{
    background:#eee;
    position:sticky;
    top:0;
    font-size:22px;
}

/* السجلات الخاصة */
.special-row td{
    color:red;
    font-weight:900;
    font-size:22px;
    background:#fff5f5;
}

#error{
    color:red;
    margin-top:15px;
    font-size:24px;
    font-weight:900;
}

#main{
    display:none;
}

</style>
</head>

<body>

<!-- شاشة تسجيل الدخول -->

<div id="login">

<h2>🔒 ادخل كلمة السر</h2>

<input type="password" id="password" placeholder="كلمة السر">

<br>

<button onclick="checkPassword()">دخول</button>

<div id="error"></div>

</div>

<!-- الصفحة الأساسية -->

<div id="main">

<h2>🔍 بحث اسطوانة</h2>

<input id="search" placeholder="ابحث (اسم - محافظة - جهة - رقم ثلاثي)">

<div id="info"></div>

<div id="table"></div>

</div>

<script>

// كلمة السر
const PASSWORD = "eh2026";

function checkPassword(){

let pass = document.getElementById("password").value;

if(pass === PASSWORD){

    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";

    loadData();

}else{

    document.getElementById("error").innerHTML =
    "❌ كلمة السر غير صحيحة";

}

}

const url =
"https://raw.githubusercontent.com/zadelrahmanzad-boop/Mognden/main/الدفع.csv";

let lines = [];
let worker;

// تحميل البيانات
function loadData(){

fetch(url)
.then(r => r.text())
.then(text => {

    lines = text.trim().split("\n");

    document.getElementById("info").innerHTML =
    "تم تحميل: " + (lines.length - 1) + " سجل";

    initWorker();

});

}

function initWorker(){

worker = new Worker(URL.createObjectURL(new Blob([`

let cache = [];

self.onmessage = function(e){

    if(e.data.type === "init"){
        cache = e.data.lines;
        return;
    }

    let q = e.data.query;
    let res = [];
    let count = 0;

    for(let i=1;i<cache.length;i++){

        let row = cache[i];

        if(row.toLowerCase().includes(q)){

            let c = row.split(";");

            res.push({
                a:c[0]||"",
                b:c[1]||"",
                c:c[2]||"",
                d:c[3]||"",
                e:c[4]||""
            });

            count++;

            if(count >= 150) break;
        }
    }

    self.postMessage(res);
};

`], {type:"text/javascript"})));

worker.postMessage({
    type:"init",
    lines
});

worker.onmessage = function(e){

    render(e.data);

};

}

function render(data){

let html = `
<table>
<tr>
<th>المؤهل</th>
<th>الرقم الثلاثي</th>
<th>الاسم</th>
<th>المحافظة</th>
<th>الجهة</th>
</tr>
`;

data.forEach(r=>{

let rowClass = r.e.includes("داخلية منطقة ( ج )")
? "special-row"
: "";

html += `
<tr class="${rowClass}">
<td>${r.a}</td>
<td>${r.b}</td>
<td>${r.c}</td>
<td>${r.d}</td>
<td>${r.e}</td>
</tr>
`;

});

html += "</table>";

document.getElementById("table").innerHTML = html;

}

// بحث لحظي
let t;

document.addEventListener("input", function(e){

if(e.target.id !== "search") return;

clearTimeout(t);

let q = e.target.value.trim().toLowerCase();

if(q.length < 2){

    document.getElementById("table").innerHTML = "";
    return;

}

t = setTimeout(()=>{

    worker.postMessage({
        query:q
    });

}, 200);

});

</script>

</body>
</html>
